<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; connect-src https://api.deepseek.com; img-src 'self' data: blob:; base-uri 'self'; form-action 'none'">
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>claudeOne · DeepSeek 聊天</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/neumorphism.css" />
  <link rel="stylesheet" href="./css/liquid-glass.css" />
  <link rel="stylesheet" href="./css/animations.css" />
</head>
<body data-page="ai" data-route-state="idle">
  <script src="./js/theme-init.js"></script>

  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <div class="ambient ambient-c"></div>

  <div class="site-shell">
    <header class="site-header page-chunk" data-reveal-order="1">
      <a class="site-brand" href="./index.html" data-nav-link>
        <span class="brand-mark" aria-hidden="true">◩</span>
        <span class="brand-text">
          <small>魔方的</small>
          <strong>妙妙工具</strong>
        </span>
      </a>

      <nav class="site-nav" aria-label="Main"></nav>

      <div class="header-actions">
        <label class="theme-toggle" aria-label="切换主题">
          <span class="theme-toggle__label" data-theme-label>Soft UI</span>
          <input type="checkbox" data-theme-toggle class="theme-toggle__input" />
          <span class="theme-toggle__track">
            <span class="theme-toggle__thumb"></span>
          </span>
        </label>
        <span class="sr-only" data-theme-live aria-live="polite"></span>
      </div>
    </header>

    <main class="page-stack">
      <section class="page-chunk" data-reveal-order="2">
        <span class="section-kicker">Chat</span>
        <h1 style="margin-top:12px">DeepSeek V4</h1>
        <p class="muted" style="max-width:62ch; margin-top:8px">
          对接 DeepSeek 官方 /chat/completions 接口，支持思维链（reasoning_content）与流式回复。
          API Key 只写入你本地浏览器的 localStorage，不进代码仓库。
        </p>
      </section>

      <section class="card chat-shell page-chunk" data-reveal-order="3" data-ai-root>
        <header class="chat-toolbar">
          <div class="chat-toolbar__row chat-toolbar__row--main">
            <div class="chat-toolbar__group">
              <div class="chat-chip">
                <span class="chat-chip__label">模型</span>
                <select class="chat-chip__select" data-model aria-label="模型"></select>
              </div>

              <label class="chat-toggle">
                <input type="checkbox" data-thinking />
                <span class="chat-toggle__track" aria-hidden="true"></span>
                <span class="chat-toggle__label">思维链</span>
              </label>

              <div class="segmented chat-segmented" data-effort role="radiogroup" aria-label="推理强度" hidden>
                <label><input type="radio" name="effort" value="high" /> High</label>
                <label><input type="radio" name="effort" value="max" /> Max</label>
              </div>
            </div>

            <div class="chat-toolbar__group chat-toolbar__group--end">
              <button class="chat-iconbtn chat-iconbtn--accent" data-newtopic type="button" aria-label="新建话题">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M12 5v14" />
                  <path d="M5 12h14" />
                </svg>
                <span>新建</span>
              </button>
              <button class="chat-iconbtn" data-prompt-open type="button" aria-label="自定义提示词">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3z" />
                  <path d="M19 14.5l.8 2.2L22 17.5l-2.2.8L19 20.5l-.8-2.2L16 17.5l2.2-.8L19 14.5z" />
                </svg>
                <span>提示词</span>
              </button>
              <button class="chat-iconbtn" data-clear type="button" aria-label="清空当前话题">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M3 6h18" />
                  <path d="M8 6V4.5A1.5 1.5 0 0 1 9.5 3h5A1.5 1.5 0 0 1 16 4.5V6" />
                  <path d="M6 6l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13" />
                  <path d="M10 11v6M14 11v6" />
                </svg>
                <span>清空</span>
              </button>
              <button class="chat-iconbtn" data-apikey-open type="button" aria-label="API Key">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="9" cy="15" r="4" />
                  <path d="M12 12l8.5-8.5" />
                  <path d="M16 7l3 3" />
                  <path d="M19 4l2.5 2.5" />
                </svg>
                <span data-apikey-label>API Key</span>
              </button>
            </div>
          </div>

          <div class="chat-toolbar__row chat-toolbar__row--meta">
            <div class="chat-topicpicker" data-topic-picker>
              <button class="chat-topicpicker__btn" data-topic-toggle type="button" aria-haspopup="true" aria-expanded="false">
                <svg class="chat-topicpicker__leadicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M21 12a8 8 0 0 1-11.6 7.1L4 21l1.9-5.4A8 8 0 1 1 21 12z" />
                </svg>
                <span class="chat-topicpicker__name" data-topic-name>新对话</span>
                <svg class="chat-topicpicker__chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M6 9l6 6 6-6" />
                </svg>
              </button>
              <div class="chat-topicpicker__panel" data-topic-panel hidden>
                <div class="chat-topicpicker__list" data-topic-list></div>
                <div class="chat-topicpicker__footer">
                  <button class="chat-topicpicker__newbtn" data-topic-newbtn type="button">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M12 5v14" /><path d="M5 12h14" />
                    </svg>
                    <span>新建话题</span>
                  </button>
                </div>
              </div>
            </div>
            <span class="chat-toolbar__sep" aria-hidden="true"></span>
            <span class="chat-status" data-status>就绪</span>
            <span class="chat-toolbar__sep" aria-hidden="true"></span>
            <span class="chat-promptchip" data-prompt-hint>
              <span class="chat-promptchip__dot" aria-hidden="true"></span>
              <span data-prompt-hint-text>默认提示词</span>
            </span>
          </div>
        </header>

        <div class="chat-messages" data-messages></div>

        <form class="chat-composer" data-composer>
          <div class="chat-composer__field">
            <label class="sr-only" for="chatInput">Message</label>
            <textarea id="chatInput" class="textarea chat-composer__input" data-input rows="2" maxlength="4000"
                      placeholder="问点什么… (Enter 发送, Shift+Enter 换行)"></textarea>
            <span class="chat-composer__count" data-count>0 / 4000</span>
          </div>
          <div class="chat-composer__actions">
            <button class="chat-stop" data-stop type="button" hidden aria-label="中止生成">
              <span class="chat-stop__halo" aria-hidden="true"></span>
              <span class="chat-stop__icon" aria-hidden="true"></span>
              <span class="chat-stop__text">中止</span>
            </button>
            <button class="chat-send" data-send type="submit" aria-label="发送消息">
              <span class="chat-send__text">发送</span>
              <svg class="chat-send__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M5 12h14" />
                <path d="M13 6l6 6-6 6" />
              </svg>
            </button>
          </div>
        </form>
      </section>
    </main>

    <footer class="site-footer page-chunk" data-reveal-order="4">
      <span>claudeOne · DeepSeek V4</span>
    </footer>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/shell.js"></script>
  <script src="./js/ai.js"></script>
</body>
</html>
