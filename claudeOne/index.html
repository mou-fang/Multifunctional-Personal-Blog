<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="description" content="claudeOne — quiet personal workspace" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; connect-src 'self' https:; img-src 'self' data: blob:; media-src 'self' blob:; worker-src 'self'; base-uri 'self'; form-action 'none'">
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>claudeOne · 魔方工作台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Core CSS (always loaded) -->
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/neumorphism.css" />
  <link rel="stylesheet" href="./css/liquid-glass.css" />
  <link rel="stylesheet" href="./css/animations.css" />
  <link rel="stylesheet" href="./css/player.css" />
  <!-- Page-specific CSS loaded on demand by router -->
</head>
<body data-page="home" data-route-state="idle">
  <script src="./js/theme-init.js"></script>

  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <div class="ambient ambient-c"></div>

  <div class="site-shell">
    <header class="site-header page-chunk" data-reveal-order="1">
      <a class="site-brand" href="#/home" data-nav-link>
        <span class="brand-mark" aria-hidden="true">◩</span>
        <span class="brand-text">
          <small>魔方的</small>
          <strong>妙妙工具</strong>
        </span>
      </a>

      <nav class="site-nav" aria-label="Main"></nav>

      <div class="header-actions">
        <label class="theme-toggle" aria-label="切换主题">
          <span class="theme-toggle__label" data-theme-label>Soft UI</span>
          <input type="checkbox" data-theme-toggle class="theme-toggle__input" />
          <span class="theme-toggle__track">
            <span class="theme-toggle__thumb"></span>
          </span>
        </label>
        <span class="sr-only" data-theme-live aria-live="polite"></span>
      </div>
    </header>

    <!-- Page content injected here by router -->
    <main class="page-stack" data-content-slot>
      <!-- Home page is the default; router mounts it on init -->
    </main>

    <footer class="site-footer page-chunk" data-reveal-order="8">
      <span>claudeOne · Soft UI ↔ Liquid Glass · no build</span>
    </footer>
  </div>

  <!-- Global Audio Player -->
  <div class="global-player" data-global-player hidden>
    <div class="global-player__inner">
      <div class="global-player__cover-wrap">
        <img class="global-player__cover-img" data-gp-cover alt="" hidden />
        <div class="global-player__cover-placeholder" data-gp-cover-placeholder hidden></div>
      </div>
      <div class="global-player__center">
        <div class="global-player__title" data-gp-title></div>
        <div class="global-player__meta-row">
          <span class="global-player__meta" data-gp-meta></span>
          <span class="global-player__source" data-gp-source></span>
        </div>
        <div class="global-player__progress-wrap" data-gp-progress-wrap>
          <div class="global-player__progress-fill" data-gp-progress-fill style="width:0%"></div>
          <div class="global-player__progress-thumb" data-gp-progress-thumb></div>
        </div>
        <div class="global-player__time-row">
          <span class="global-player__time" data-gp-current-time>00:00</span>
          <span class="global-player__time" data-gp-duration></span>
        </div>
      </div>
      <div class="global-player__controls">
        <button class="global-player__btn" data-gp-prev title="上一首">⏮</button>
        <button class="global-player__btn global-player__btn--play" data-gp-play title="播放/暂停">▶</button>
        <button class="global-player__btn" data-gp-next title="下一首">⏭</button>
        <button class="global-player__btn" data-gp-mode title="Play mode">→</button>
        <div class="global-player__volume-group">
          <span class="global-player__volume-icon" data-gp-volume-icon>🔊</span>
          <input type="range" class="global-player__volume-slider" data-gp-volume min="0" max="100" value="80" />
        </div>
        <button class="global-player__btn global-player__btn--expand" data-gp-expand title="最小化">─</button>
      </div>
    </div>
    <div class="global-player__drop-overlay">释放以添加到播放队列</div>
    <audio data-gp-audio hidden preload="auto"></audio>
  </div>

  <!-- Toast rail (created by shell.js) -->

  <!-- Page Templates -->
  <template id="page-home">
    <section class="cube-hero page-chunk" data-reveal-order="2">
      <div class="cube-hero__cube">
        <div class="cube-stage" data-cube-stage aria-label="3D Rubik's cube"></div>
        <div class="cube-controls">
          <div class="cube-turns" role="toolbar" aria-label="魔方面操作">
            <button class="cube-turn-btn" data-cube-turn="U" type="button" aria-label="Up clockwise">U</button>
            <button class="cube-turn-btn" data-cube-turn="U'" type="button" aria-label="Up counter-clockwise">U'</button>
            <button class="cube-turn-btn" data-cube-turn="D" type="button" aria-label="Down clockwise">D</button>
            <button class="cube-turn-btn" data-cube-turn="D'" type="button" aria-label="Down counter-clockwise">D'</button>
            <button class="cube-turn-btn" data-cube-turn="L" type="button" aria-label="Left clockwise">L</button>
            <button class="cube-turn-btn" data-cube-turn="L'" type="button" aria-label="Left counter-clockwise">L'</button>
            <button class="cube-turn-btn" data-cube-turn="R" type="button" aria-label="Right clockwise">R</button>
            <button class="cube-turn-btn" data-cube-turn="R'" type="button" aria-label="Right counter-clockwise">R'</button>
            <button class="cube-turn-btn" data-cube-turn="F" type="button" aria-label="Front clockwise">F</button>
            <button class="cube-turn-btn" data-cube-turn="F'" type="button" aria-label="Front counter-clockwise">F'</button>
            <button class="cube-turn-btn" data-cube-turn="B" type="button" aria-label="Back clockwise">B</button>
            <button class="cube-turn-btn" data-cube-turn="B'" type="button" aria-label="Back counter-clockwise">B'</button>
          </div>
          <div class="cube-actions">
            <button class="btn btn-primary" data-cube-scramble type="button">打乱</button>
            <button class="btn btn-ghost" data-cube-reset type="button">还原</button>
          </div>
          <p class="cube-hint">键盘：U D L R F B（Shift = 反向）· 空格打乱 · Esc 还原</p>
        </div>
      </div>
      <div class="cube-hero__copy">
        <span class="pill pill--accent">claudeOne</span>
        <h1 class="cube-hero__title">无意义的<br />魔方工作台。</h1>
        <p class="cube-hero__lead">
          这里摆着几件工具，还有更多空位。左边的魔方可以把玩，鼠标离开魔方就会散开，反之聚合。
          右上角的开关在 Soft UI 和 Liquid Glass 之间切换，两种风格都按 1:1 复刻。
        </p>
        <div class="cube-hero__tags">
          <span class="pill">Neumorphism</span>
          <span class="pill">Liquid Glass</span>
          <span class="pill">No build step</span>
        </div>
        <p class="cube-hero__hint">拖动魔方 · 切换风格 · 选一个工具开始</p>
      </div>
    </section>
    <section class="home-cta page-chunk" data-reveal-order="3">
      <p class="home-cta__text">从顶部导航选择「游戏」或「工具箱」开始探索</p>
    </section>
  </template>

  <template id="page-games">
    <section class="page-chunk" data-reveal-order="2">
      <span class="section-kicker">Games</span>
      <h1 style="margin-top:12px">游戏中心</h1>
      <p class="muted" style="max-width:62ch; margin-top:8px">
        这里放一些可以直接打开玩的小游戏和聚会娱乐玩法。
      </p>
    </section>
    <div class="feature-grid" data-card-grid="games"></div>
  </template>

  <template id="page-tools">
    <section class="page-chunk" data-reveal-order="2">
      <span class="section-kicker">Tools</span>
      <h1 style="margin-top:12px">工具箱</h1>
      <p class="muted" style="max-width:62ch; margin-top:8px">
        把常用、小众、奇怪但有用的工具都放在这里。
      </p>
    </section>
    <div class="feature-grid" data-card-grid="tools"></div>
  </template>

  <template id="page-game">
    <section class="page-chunk" data-reveal-order="2">
      <span class="section-kicker">Party Game</span>
      <h1 style="margin-top:12px">俄罗斯转盘</h1>
      <p class="muted" style="max-width:62ch; margin-top:8px">
        经典规则：弹巢里有若干发子弹，玩家轮流扣动扳机。调整人数、子弹、规则，然后开始。
      </p>
    </section>
    <section class="roulette-grid page-chunk" data-reveal-order="3" data-view-setup>
      <div class="card setup-card">
        <div class="setup-section">
          <div class="setup-section__head">
            <span class="card-eyebrow">玩家</span>
            <span class="pill"><span data-player-count>2</span> 人</span>
          </div>
          <div data-player-list></div>
          <button class="btn btn-ghost" data-add-player type="button">+ 添加玩家</button>
        </div>
        <div class="setup-section">
          <div class="setup-section__head"><span class="card-eyebrow">弹巢</span></div>
          <div style="display:flex;gap:var(--space-5);flex-wrap:wrap">
            <label class="field" style="min-width:180px">
              <span class="field__label">弹巢大小</span>
              <div class="stepper" data-stepper-chamber>
                <button type="button" data-op="minus" aria-label="减少">−</button>
                <span class="stepper__value">6</span>
                <button type="button" data-op="plus" aria-label="增加">+</button>
              </div>
            </label>
            <label class="field" style="min-width:180px">
              <span class="field__label">子弹数量</span>
              <div class="stepper" data-stepper-bullets>
                <button type="button" data-op="minus" aria-label="减少">−</button>
                <span class="stepper__value">1</span>
                <button type="button" data-op="plus" aria-label="增加">+</button>
              </div>
            </label>
          </div>
        </div>
        <div class="setup-section">
          <span class="card-eyebrow">结束条件</span>
          <div class="radio-group">
            <label class="radio-option"><input type="radio" name="endCondition" value="bullets-empty" /><span class="radio-option__mark"></span><span class="radio-option__body"><span class="radio-option__title">直到所有子弹打完</span><span class="radio-option__desc">无论打中谁，游戏进行到最后一发子弹触发</span></span></label>
            <label class="radio-option"><input type="radio" name="endCondition" value="one-round" /><span class="radio-option__mark"></span><span class="radio-option__body"><span class="radio-option__title">每人轮一次就结束</span><span class="radio-option__desc">适合快速回合，中弹者算出局</span></span></label>
            <label class="radio-option"><input type="radio" name="endCondition" value="last-standing" /><span class="radio-option__mark"></span><span class="radio-option__body"><span class="radio-option__title">淘汰制 · 留到最后者胜</span><span class="radio-option__desc">中弹即出局，剩下一人即胜</span></span></label>
          </div>
        </div>
        <div class="setup-section">
          <span class="card-eyebrow">回合顺序</span>
          <div class="radio-group">
            <label class="radio-option"><input type="radio" name="turnOrder" value="fixed" /><span class="radio-option__mark"></span><span class="radio-option__body"><span class="radio-option__title">按玩家列表顺序</span><span class="radio-option__desc">上面拖拽的顺序就是发言顺序</span></span></label>
            <label class="radio-option"><input type="radio" name="turnOrder" value="random" /><span class="radio-option__mark"></span><span class="radio-option__body"><span class="radio-option__title">开局随机打乱</span><span class="radio-option__desc">开局一次洗牌，之后按新顺序轮</span></span></label>
          </div>
        </div>
        <div class="setup-section">
          <span class="card-eyebrow">细节选项</span>
          <label class="switch"><input type="checkbox" data-toggle-autospin checked /><span class="switch__track"></span><span class="switch__label">每次开枪后自动转弹巢（紧张度更高）</span></label>
          <label class="switch"><input type="checkbox" data-toggle-reveal /><span class="switch__track"></span><span class="switch__label">在图示上暴露子弹位置（调试/旁观用）</span></label>
        </div>
        <button class="btn btn-primary" data-start type="button" style="align-self:flex-start">开始游戏 →</button>
      </div>
      <aside class="card" style="padding:var(--space-6)">
        <span class="card-eyebrow">说明</span>
        <h3 class="card-title" style="margin-top:var(--space-2)">游戏约定</h3>
        <ul style="display:flex;flex-direction:column;gap:var(--space-3);margin-top:var(--space-3);color:var(--ink-soft);font-size:.92rem">
          <li>每局开始会随机布置子弹在弹巢中，不暴露位置。</li>
          <li>如果开启了"自动转弹巢"，每次未命中后会重新布置子弹位置。</li>
          <li>拖动玩家左侧的 ☰ 可以改变顺序。</li>
          <li>支持 2&ndash;10 人，弹巢可在 4&ndash;12 格之间。</li>
          <li>所有设置只在当前页面有效，不会保存。</li>
        </ul>
      </aside>
    </section>
    <section class="page-chunk hidden" data-reveal-order="3" data-view-play>
      <div class="play-grid">
        <div class="card chamber-panel">
          <div class="current-player" data-current-player>—</div>
          <div class="chamber-svg" data-chamber></div>
          <div class="chamber-info" data-chamber-info></div>
          <div class="result-banner" data-result>准备好了就按下扳机</div>
          <button class="btn btn-primary fire-btn" data-fire type="button" aria-label="Fire">扣扳机</button>
          <p class="muted" data-remaining-players></p>
        </div>
        <aside class="card turn-log-panel">
          <span class="card-eyebrow">回合日志</span>
          <ul class="turn-log" data-turn-log></ul>
        </aside>
      </div>
    </section>
    <section class="page-chunk hidden end-view card" data-reveal-order="3" data-view-end>
      <div data-end-banner></div>
      <div class="modal-actions" data-end-actions style="margin-top:var(--space-4)"></div>
    </section>
  </template>

  <!-- Script order: config → shell → player → page-registry → router → homepage JS -->
  <script src="./js/config.js"></script>
  <script src="./js/shell.js"></script>

  <!-- music/playlist.js — auto-generated by start.bat; loads window.__MUSIC_PLAYLIST -->
  <script src="./music/playlist.js"></script>

  <script src="./js/player.js"></script>
  <script src="./js/page-registry.js"></script>
  <script src="./js/router.js"></script>
  <template id="page-pixel">
<!-- Hero -->
      <section class="page-chunk" data-reveal-order="2">
        <span class="pill pill--accent">Image Tool</span>
        <h1 style="margin-top:12px">图片像素化工具</h1>
        <p class="muted" style="max-width:62ch; margin-top:8px">
          把普通图片变成复古像素风、Game Boy 风、8-bit 风或自定义调色板像素画。
          支持实时预览、多种调色板、色彩调整和特效叠加，完全在浏览器本地处理。
        </p>
      </section>

      <!-- Upload zone — full width at top -->
      <section class="page-chunk" data-reveal-order="3">
        <div class="pixel-upload" data-upload-zone data-dragover="false">
          <div class="pixel-upload__inner" data-drop-visual>
            <div class="pixel-upload__icon">&#9654;</div>
            <div class="pixel-upload__title">拖拽图片到此处，或点击选择</div>
            <div class="pixel-upload__hint">支持 JPG / PNG / WebP / BMP 格式</div>
          </div>
          <!-- Preview after upload (replaces the drop visual) -->
          <div class="pixel-upload__preview" data-preview-area hidden>
            <img class="pixel-upload__thumb" data-preview-img src="" alt="原图预览" />
            <div class="pixel-upload__info">
              <span class="pixel-upload__name" data-preview-name></span>
              <span class="pixel-upload__dims" data-preview-dims></span>
            </div>
            <button class="btn btn-sm btn-ghost" data-clear-preview type="button">更换图片</button>
          </div>
          <input type="file" class="pixel-upload__input" data-file-input accept="image/jpeg,image/png,image/webp,image/bmp" aria-label="选择图片文件" />
        </div>
      </section>

      <!-- Workspace: result + controls side by side -->
      <section class="pixel-workspace page-chunk" data-reveal-order="4" hidden>
        <!-- Left: result canvas -->
        <div class="pixel-main">
          <div class="pixel-result">
            <div class="pixel-result__head">
              <h3>像素化结果</h3>
              <span class="pixel-result__dims" data-result-dims></span>
            </div>
            <div class="pixel-result__canvas-wrap" data-result-wrap>
              <canvas data-result-canvas></canvas>
            </div>
          </div>

          <!-- Actions -->
          <div class="pixel-actions">
            <button class="btn btn-primary" data-export-png type="button">导出 PNG</button>
            <button class="btn" data-copy-config type="button">复制配置 JSON</button>
            <button class="btn btn-ghost" data-reset-defaults type="button">恢复默认</button>
            <button class="btn btn-ghost" data-clear-all type="button">清空</button>
          </div>
        </div>

        <!-- Right: controls panel -->
        <div class="pixel-controls card" data-controls-panel>
          <div class="pixel-controls__head">
            <h3>参数设置</h3>
            <button class="pixel-controls__collapse" data-collapse-btn type="button" aria-label="折叠参数" hidden>&#9650;</button>
          </div>

          <div class="pixel-controls__body" data-controls-body>
            <!-- Pixel block size -->
            <div class="pixel-field">
              <span class="pixel-field__label">像素块大小</span>
              <div class="pixel-range-row">
                <input type="range" data-block-size min="2" max="64" value="8" step="1" aria-label="像素块大小" />
                <span class="pixel-slider-val" data-block-size-val>8</span>
              </div>
              <div class="pixel-presets" data-block-presets>
                <button class="pill" data-preset="4" type="button">细腻 4</button>
                <button class="pill" data-preset="8" type="button">标准 8</button>
                <button class="pill" data-preset="16" type="button">粗颗粒 16</button>
                <button class="pill" data-preset="32" type="button">超低清 32</button>
              </div>
            </div>

            <!-- Output max width -->
            <div class="pixel-field">
              <span class="pixel-field__label">输出最大宽度</span>
              <div class="segmented pixel-seg" data-width-group role="radiogroup" aria-label="最大宽度">
                <label><input type="radio" name="maxW" value="0" data-max-w checked /> 原始</label>
                <label><input type="radio" name="maxW" value="512" data-max-w /> 512</label>
                <label><input type="radio" name="maxW" value="1024" data-max-w /> 1024</label>
                <label><input type="radio" name="maxW" value="1920" data-max-w /> 1920</label>
                <label><input type="radio" name="maxW" value="custom" data-max-w /> 自定义</label>
              </div>
              <input class="input pixel-custom-input" type="number" data-width-custom min="64" max="4096" value="1024" placeholder="px" aria-label="自定义宽度" style="display:none" />
            </div>

            <!-- Output max height -->
            <div class="pixel-field">
              <span class="pixel-field__label">输出最大高度</span>
              <div class="segmented pixel-seg" data-height-group role="radiogroup" aria-label="最大高度">
                <label><input type="radio" name="maxH" value="0" data-max-h checked /> 自动</label>
                <label><input type="radio" name="maxH" value="512" data-max-h /> 512</label>
                <label><input type="radio" name="maxH" value="1024" data-max-h /> 1024</label>
                <label><input type="radio" name="maxH" value="custom" data-max-h /> 自定义</label>
              </div>
              <input class="input pixel-custom-input" type="number" data-height-custom min="64" max="4096" value="1024" placeholder="px" aria-label="自定义高度" style="display:none" />
            </div>

            <!-- Color mode -->
            <div class="pixel-field">
              <span class="pixel-field__label">色彩模式</span>
              <div class="segmented pixel-seg" data-color-mode-group role="radiogroup" aria-label="色彩模式">
                <label><input type="radio" name="colorMode" value="original" data-color-mode checked /> 原色</label>
                <label><input type="radio" name="colorMode" value="grayscale" data-color-mode /> 灰度</label>
                <label><input type="radio" name="colorMode" value="bw" data-color-mode /> 黑白</label>
                <label><input type="radio" name="colorMode" value="highContrast" data-color-mode /> 高对比</label>
                <label><input type="radio" name="colorMode" value="invert" data-color-mode /> 反色</label>
              </div>
            </div>

            <!-- Adjustment sliders -->
            <div class="pixel-field">
              <span class="pixel-field__label">饱和度</span>
              <div class="pixel-range-row">
                <input type="range" data-saturation min="-100" max="100" value="0" step="1" aria-label="饱和度" />
                <span class="pixel-slider-val" data-saturation-val>0</span>
              </div>
            </div>
            <div class="pixel-field">
              <span class="pixel-field__label">亮度</span>
              <div class="pixel-range-row">
                <input type="range" data-brightness min="-100" max="100" value="0" step="1" aria-label="亮度" />
                <span class="pixel-slider-val" data-brightness-val>0</span>
              </div>
            </div>
            <div class="pixel-field">
              <span class="pixel-field__label">对比度</span>
              <div class="pixel-range-row">
                <input type="range" data-contrast min="-100" max="100" value="0" step="1" aria-label="对比度" />
                <span class="pixel-slider-val" data-contrast-val>0</span>
              </div>
            </div>

            <!-- Palette -->

                <label><input type="radio" name="contentType" value="sms" data-content-type /> SMS</label>
              </div>
            </div>

            <!-- URL / Text input -->
            <div class="qr-field" data-content-simple>
              <span class="qr-field__label" data-content-label>网址</span>
              <textarea class="textarea qr-content-input" data-content-input rows="3" placeholder="https://example.com" aria-label="二维码内容"></textarea>
              <p class="muted qr-url-hint" data-url-hint style="font-size:0.75rem;display:none">
                提示：建议以 https:// 开头
              </p>
            </div>

            <!-- Wi-Fi fields -->
            <div class="qr-wifi-fields" data-wifi-fields hidden>
              <div class="qr-field">
                <span class="qr-field__label">SSID（网络名称）</span>
                <input class="input" type="text" data-wifi-ssid placeholder="MyWiFi" aria-label="Wi-Fi SSID" />
              </div>
              <div class="qr-field">
                <span class="qr-field__label">密码</span>
                <input class="input" type="text" data-wifi-pass placeholder="password" aria-label="Wi-Fi 密码" />
              </div>
              <div class="qr-field">
                <span class="qr-field__label">加密类型</span>
                <div class="segmented qr-seg" data-wifi-enc-group role="radiogroup" aria-label="加密类型">
                  <label><input type="radio" name="wifiEnc" value="WPA" data-wifi-enc checked /> WPA</label>
                  <label><input type="radio" name="wifiEnc" value="WEP" data-wifi-enc /> WEP</label>
                  <label><input type="radio" name="wifiEnc" value="" data-wifi-enc /> 无</label>
                </div>
              </div>
              <div class="qr-field">
                <label class="switch" data-toggle="wifiHidden">
                  <input type="checkbox" />
                  <span class="switch__track"></span>
                  <span class="switch__label">隐藏网络</span>
                </label>
              </div>
            </div>

            <!-- Email fields -->
            <div class="qr-email-fields" data-email-fields hidden>
              <div class="qr-field">
                <span class="qr-field__label">邮箱地址</span>
                <input class="input" type="email" data-email-to placeholder="user@example.com" aria-label="邮箱地址" />
              </div>
              <div class="qr-field">
                <span class="qr-field__label">主题</span>
                <input class="input" type="text" data-email-subject placeholder="Hello" aria-label="邮件主题" />
              </div>
              <div class="qr-field">
                <span class="qr-field__label">正文</span>
                <textarea class="textarea" data-email-body rows="2" placeholder="邮件正文..." aria-label="邮件正文"></textarea>
              </div>
            </div>

            <!-- Phone fields -->
            <div class="qr-phone-fields" data-phone-fields hidden>
              <div class="qr-field">
                <span class="qr-field__label">电话号码</span>
                <input class="input" type="tel" data-phone-num placeholder="+8613800138000" aria-label="电话号码" />
              </div>
            </div>

            <!-- SMS fields -->
            <div class="qr-sms-fields" data-sms-fields hidden>
              <div class="qr-field">
                <span class="qr-field__label">手机号码</span>
                <input class="input" type="tel" data-sms-num placeholder="+8613800138000" aria-label="手机号码" />
              </div>
              <div class="qr-field">
                <span class="qr-field__label">短信内容</span>
                <textarea class="textarea" data-sms-body rows="2" placeholder="短信内容..." aria-label="短信内容"></textarea>
              </div>
            </div>
          </div>

          <!-- Size -->
          <div class="qr-params__section">
            <div class="qr-params__head">尺寸</div>
            <div class="qr-field">
              <span class="qr-field__label">宽度</span>
              <div class="qr-range-row">
                <input type="range" data-width min="128" max="1024" value="300" step="1" aria-label="宽度" />
                <span class="qr-slider-val" data-width-val>300</span>
              </div>
            </div>
            <div class="qr-field">
              <span class="qr-field__label">高度</span>
              <div class="qr-range-row">
                <input type="range" data-height min="128" max="1024" value="300" step="1" aria-label="高度" />
                <span class="qr-slider-val" data-height-val>300</span>
              </div>
            </div>
            <div class="qr-field">
              <span class="qr-field__label">常用尺寸</span>
              <div class="qr-size-presets">
                <button class="pill" data-size-preset="256" type="button">256</button>
                <button class="pill" data-size-preset="512" type="button">512</button>
                <button class="pill" data-size-preset="768" type="button">768</button>
                <button class="pill" data-size-preset="1024" type="button">1024</button>
              </div>
            </div>
            <div class="qr-field">
              <span class="qr-field__label">边距</span>
              <div class="qr-range-row">
                <input type="range" data-margin min="0" max="100" value="20" step="1" aria-label="边距" />
                <span class="qr-slider-val" data-margin-val>20</span>
              </div>
            </div>
            <div class="qr-field">
              <label class="switch" data-toggle="transparentBg">
                <input type="checkbox" />
                <span class="switch__track"></span>
                <span class="switch__label">透明背景</span>
              </label>
            </div>
            <div class="qr-field" data-bg-color-wrap>
              <span class="qr-field__label">背景颜色</span>
              <div class="qr-color-row">
                <input type="color" data-bg-color value="#ffffff" class="qr-color-input" aria-label="背景颜色" />
                <span class="qr-color-hex" data-bg-color-hex>#ffffff</span>
              </div>
            </div>
          </div>

          <!-- Dots -->
          <div class="qr-params__section">
            <div class="qr-params__head">点样式</div>
            <div class="qr-field">
              <span class="qr-field__label">形状</span>
              <div class="segmented qr-seg" data-dots-type-group role="radiogroup" aria-label="点形状">
                <label><input type="radio" name="dotsType" value="square" data-dots-type /> 方块</label>
                <label><input type="radio" name="dotsType" value="dots" data-dots-type /> 圆点</label>
                <label><input type="radio" name="dotsType" value="rounded" data-dots-type /> 圆角</label>
                <label><input type="radio" name="dotsType" value="classy" data-dots-type /> 优雅</label>
                <label><input type="radio" name="dotsType" value="classy-rounded" data-dots-type checked /> 优雅圆角</label>
                <label><input type="radio" name="dotsType" value="extra-rounded" data-dots-type /> 超圆</label>
              </div>
            </div>
            <div class="qr-field">
              <span class="qr-field__label">主颜色</span>
              <div class="qr-color-row">
                <input type="color" data-dots-color value="#6f9bff" class="qr-color-input" aria-label="主颜色" />
                <span class="qr-color-hex" data-dots-color-hex>#6f9bff</span>
              </div>
            </div>
            <div class="qr-field">
              <label class="switch" data-toggle="dotsGradient">
                <input type="checkbox" />
                <span class="switch__track"></span>
                <span class="switch__label">渐变色</span>
              </label>
            </div>
            <div class="qr-gradient-options" data-dots-gradient hidden>
              <div class="qr-field">
                <span class="qr-field__label">渐变类型</span>
                <div class="segmented qr-seg" data-dots-grad-type-group role="radiogroup" aria-label="渐变类型">
                  <label><input type="radio" name="dotsGradType" value="linear" data-dots-grad-type checked /> 线性</label>
                  <label><input type="radio" name="dotsGradType" value="radial" data-dots-grad-type /> 径向</label>
                </div>
              </div>
              <div class="qr-field">
                <span class="qr-field__label">渐变色 1</span>
                <div class="qr-color-row">
                  <input type="color" data-dots-grad1 value="#6f9bff" class="qr-color-input" aria-label="渐变色 1" />
                  <span class="qr-color-hex" data-dots-grad1-hex>#6f9bff</span>
                </div>
              </div>
              <div class="qr-field">
                <span class="qr-field__label">渐变色 2</span>
                <div class="qr-color-row">
                  <input type="color" data-dots-grad2 value="#ff6b7a" class="qr-color-input" aria-label="渐变色 2" />
                  <span class="qr-color-hex" data-dots-grad2-hex>#ff6b7a</span>
                </div>
              </div>
              <div class="qr-field">
                <span class="qr-field__label">旋转角度</span>
                <div class="qr-range-row">
                  <input type="range" data-dots-grad-rotation min="0" max="360" value="0" step="1" aria-label="渐变旋转角度" />
                  <span class="qr-slider-val" data-dots-grad-rotation-val>0&deg;</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Corner Square -->
          <div class="qr-params__section">
            <div class="qr-params__head">角标样式</div>
            <div class="qr-field">
              <span class="qr-field__label">形状</span>
              <div class="segmented qr-seg" data-corners-square-type-group role="radiogroup" aria-label="角标形状">
                <label><input type="radio" name="cornersSquareType" value="square" data-corners-square-type /> 方块</label>
                <label><input type="radio" name="cornersSquareType" value="dot" data-corners-square-type /> 圆点</label>
                <label><input type="radio" name="cornersSquareType" value="extra-rounded" data-corners-square-type checked /> 超圆</label>
              </div>
            </div>
            <div class="qr-field">
              <label class="switch" data-toggle="cornersSquareFollowDots">
                <input type="checkbox" checked />
                <span class="switch__track"></span>
                <span class="switch__label">跟随主色</span>
              </label>
            </div>
            <div class="qr-field" data-corners-square-color-wrap hidden>
              <span class="qr-field__label">角标颜色</span>
              <div class="qr-color-row">
                <input type="color" data-corners-square-color value="#6f9bff" class="qr-color-input" aria-label="角标颜色" />
                <span class="qr-color-hex" data-corners-square-color-hex>#6f9bff</span>
              </div>
            </div>
          </div>

          <!-- Corner Dot -->
          <div class="qr-params__section">
            <div class="qr-params__head">角点样式</div>
            <div class="qr-field">
              <span class="qr-field__label">形状</span>
              <div class="segmented qr-seg" data-corners-dot-type-group role="radiogroup" aria-label="角点形状">
                <label><input type="radio" name="cornersDotType" value="square" data-corners-dot-type /> 方块</label>
                <label><input type="radio" name="cornersDotType" value="dot" data-corners-dot-type checked /> 圆点</label>
              </div>
            </div>
            <div class="qr-field">
              <label class="switch" data-toggle="cornersDotFollowDots">
                <input type="checkbox" checked />
                <span class="switch__track"></span>
                <span class="switch__label">跟随主色</span>
              </label>
            </div>
            <div class="qr-field" data-corners-dot-color-wrap hidden>
              <span class="qr-field__label">角点颜色</span>
              <div class="qr-color-row">
                <input type="color" data-corners-dot-color value="#6f9bff" class="qr-color-input" aria-label="角点颜色" />
                <span class="qr-color-hex" data-corners-dot-color-hex>#6f9bff</span>
              </div>
            </div>
          </div>

          <!-- Logo -->
          <div class="qr-params__section">
            <div class="qr-params__head">Logo 设置</div>
            <div class="qr-logo-upload" data-logo-upload>
              <div class="qr-logo-upload__inner" data-logo-drop-visual>
                <div class="qr-logo-upload__icon">&#9654;</div>
                <div class="qr-logo-upload__title">拖拽 Logo 到此处，或点击选择</div>
                <div class="qr-logo-upload__hint">支持 JPG / PNG / SVG</div>
              </div>
              <div class="qr-logo-preview" data-logo-preview hidden>
                <img class="qr-logo-preview__img" data-logo-img src="" alt="Logo 预览" />
                <div class="qr-logo-preview__actions">
                  <button class="btn btn-sm btn-ghost" data-remove-logo type="button">移除 Logo</button>
                </div>
              </div>
              <input type="file" class="qr-logo-upload__input" data-logo-input accept="image/jpeg,image/png,image/svg+xml" aria-label="上传 Logo" />
            </div>
            <div class="qr-field">
              <span class="qr-field__label">Logo 大小</span>
              <div class="qr-range-row">
                <input type="range" data-logo-size min="0.1" max="0.5" value="0.3" step="0.01" aria-label="Logo 大小" />
                <span class="qr-slider-val" data-logo-size-val>30%</span>
              </div>
            </div>
            <div class="qr-field">
              <span class="qr-field__label">Logo 边距</span>
              <div class="qr-range-row">
                <input type="range" data-logo-margin min="0" max="30" value="5" step="1" aria-label="Logo 边距" />
                <span class="qr-slider-val" data-logo-margin-val>5</span>
              </div>
            </div>
            <div class="qr-field">
              <label class="switch" data-toggle="logoHideBg">
                <input type="checkbox" checked />
                <span class="switch__track"></span>
                <span class="switch__label">Logo 下方隐藏点阵</span>
              </label>
            </div>
          </div>

          <!-- Error correction -->
          <div class="qr-params__section">
            <div class="qr-params__head">纠错等级</div>
            <div class="qr-field">
              <span class="qr-field__label">纠错等级</span>
              <div class="segmented qr-seg" data-eccl-group role="radiogroup" aria-label="纠错等级">
                <label><input type="radio" name="eccl" value="L" data-eccl /> L (7%)</label>
                <label><input type="radio" name="eccl" value="M" data-eccl checked /> M (15%)</label>
                <label><input type="radio" name="eccl" value="Q" data-eccl /> Q (25%)</label>
                <label><input type="radio" name="eccl" value="H" data-eccl /> H (30%)</label>
              </div>
              <p class="muted" style="font-size:0.72rem;margin-top:var(--space-1)">
                Logo 越大，建议纠错等级越高（Q 或 H）。
              </p>
            </div>
          </div>
        </div>
      </section>
  </template>

  <template id="page-lottery">
<section class="lottery-hero page-chunk" data-reveal-order="2">
        <div>
          <span class="pill pill--accent">Live Draw</span>
          <h1>幸运抽奖</h1>
          <p>使用 Web Crypto 安全随机数抽取中奖者</p>
        </div>
        <div class="random-badge" data-random-status>
          <span class="random-badge__dot" aria-hidden="true"></span>
          安全随机：Web Crypto
        </div>
      </section>

      <section class="lottery-layout page-chunk" data-reveal-order="3">
        <div class="draw-stage" aria-label="抽奖舞台">
          <div class="stage-glow" aria-hidden="true"></div>

          <div class="draw-status">
            <span class="draw-status__label">当前奖项</span>
            <strong data-current-prize>一等奖</strong>
            <span data-prize-progress>剩余 1 / 1 名</span>
          </div>

          <div class="wheel-wrap" data-wheel-frame>
            <div class="bulb-ring" data-bulb-ring aria-hidden="true"></div>
            <svg class="wheel-svg" viewBox="0 0 600 600" role="img" aria-label="抽奖转盘">
              <g class="wheel-rotor" data-wheel-rotor></g>
            </svg>
            <div class="wheel-pointer" aria-hidden="true"></div>
            <div class="wheel-halo" aria-hidden="true"></div>
          </div>

          <button class="draw-button" data-spin-btn type="button">
            <span>开始抽奖</span>
            <small data-spin-subtitle>可抽 6 人</small>
          </button>

          <div class="stage-stats">
            <span><strong data-active-count>6</strong> 可抽人数</span>
            <span><strong data-winner-count>0</strong> 已中奖</span>
            <span><strong data-prize-count>3</strong> 奖项</span>
          </div>

          <div class="confetti-layer" data-confetti-layer aria-hidden="true"></div>
        </div>

        <aside class="control-deck" aria-label="抽奖控制台">
          <section class="control-card prize-card">
            <div class="panel-head">
              <div>
                <span class="section-kicker">Prizes</span>
                <h2>奖项设置</h2>
              </div>
              <button class="btn btn-ghost btn-sm" data-reset-winners type="button">重置中奖</button>
            </div>

            <div class="prize-list" data-prize-list></div>

            <form class="inline-form" data-prize-form>
              <input class="input" data-prize-name type="text" maxlength="24" placeholder="奖项名称，例如 特等奖" autocomplete="off" aria-label="奖项名称" />
              <input class="input input-quota" data-prize-quota type="number" min="1" max="100" value="1" aria-label="名额" />
              <button class="btn btn-primary btn-sm" data-prize-submit type="submit">添加奖项</button>
              <button class="btn btn-ghost btn-sm" data-prize-cancel type="button" hidden>取消</button>
            </form>
          </section>

          <section class="control-card">
            <div class="panel-head">
              <div>
                <span class="section-kicker">People</span>
                <h2>参与者</h2>
              </div>
              <button class="btn btn-ghost btn-sm" data-clear-participants type="button">清空名单</button>
            </div>

            <form class="inline-form" data-participant-form>
              <input class="input" data-participant-name type="text" maxlength="24" placeholder="输入姓名" autocomplete="off" aria-label="参与者姓名" />
              <button class="btn btn-primary btn-sm" data-participant-submit type="submit">添加</button>
              <button class="btn btn-ghost btn-sm" data-participant-cancel type="button" hidden>取消</button>
            </form>

            <div class="bulk-import">
              <textarea class="textarea" data-bulk-input rows="5" placeholder="批量导入名单：每行一个名字" aria-label="批量导入名单"></textarea>
              <div class="bulk-actions">
                <button class="btn btn-primary btn-sm" data-import-participants type="button">导入名单</button>
                <button class="btn btn-ghost btn-sm" data-clear-bulk type="button">清空输入</button>
              </div>
            </div>

            <div class="participant-list" data-participant-list></div>
          </section>

          <section class="control-card winners-card">
            <div class="panel-head">
              <div>
                <span class="section-kicker">Winners</span>
                <h2>中奖记录</h2>
              </div>
              <div class="panel-head__actions">
                <button class="btn btn-ghost btn-sm" data-copy-winners type="button">复制名单</button>
                <button class="btn btn-ghost btn-sm" data-reset-all type="button">重置全部</button>
              </div>
            </div>
            <div class="winner-list" data-winner-list></div>
          </section>
        </aside>
      </section>
  </template>

</body>
</html>
